<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逸品商务 · 销售中心总看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

:root {
  /* ── 背景层 ── */
  --bg:        #121212;
  --bg2:       #1c1c1c;
  --bg3:       #242424;
  /* ── 边框 ── */
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  /* ── 文字 ── */
  --text:      #e8eaf0;
  --text2:     #94a3b8;
  --text3:     #64748b;
  /* ── 主色：蓝 ── */
  --primary:   #3b82f6;
  --primary-lt:#60a5fa;
  --primary-dim:rgba(59,130,246,0.15);
  /* ── 状态色 ── */
  --green:     #10b981;   /* 达标 / 安全 */
  --orange:    #f59e0b;   /* 警告 */
  --red:       #ef4444;   /* 危险 / 未达标 */
  /* ── 辅助色 ── */
  --purple:    #8b5cf6;
  --cyan:      #06b6d4;
  /* ── 阴影 ── */
  --shadow:    0 1px 3px rgba(0,0,0,0.3),0 2px 8px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.5);
  --r:         10px;
  --font-mono: 'DM Mono', monospace;
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

/* ── Header ────────────────────────────────── */
.hd{
  background:rgba(18,18,18,0.96);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  padding:0 24px;height:52px;
}
.hd-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:19px;font-weight:700;letter-spacing:1px;
  color:#fff;white-space:nowrap;pointer-events:none;
  text-shadow:0 0 20px rgba(30,136,229,.5);
}
.hd-logo{
  display:flex;align-items:center;gap:10px;
  font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap;
  color:var(--primary);
}
.hd-logo-gem{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#1E88E5,#42A5F5);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;box-shadow:0 0 14px rgba(30,136,229,.4);
}
.hd-sep{width:1px;height:24px;background:var(--border2);flex-shrink:0}
.hd-meta{font-size:12px;color:var(--text2);font-family:var(--font-mono)}
.hd-live{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--red);font-weight:600;letter-spacing:.5px;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--red);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── Tab Nav ───────────────────────────────── */
.nav{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:center;padding:0 24px;overflow-x:auto;scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  padding:12px 16px;border:none;background:none;cursor:pointer;
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  color:var(--text2);white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;
  display:flex;align-items:center;gap:6px;
}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.nav-chip{
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;
  background:rgba(239,68,68,.12);color:var(--red);
}

/* ── Layout ────────────────────────────────── */
.main{padding:20px 24px;max-width:1680px;margin:0 auto}
.panel{display:none}
.panel.on{display:block;animation:panelIn .22s ease forwards}
@keyframes panelIn{
  from{opacity:0;transform:translateY(7px)}
  to{opacity:1;transform:translateY(0)}
}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
.mb16{margin-bottom:16px}

/* ── Cards ─────────────────────────────────── */
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;
  box-shadow:var(--shadow);
}
.card-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.card-title{
  font-size:13px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.6px;
  display:flex;align-items:center;gap:8px;
}
.card-title::before{
  content:'';width:3px;height:14px;
  background:var(--primary);border-radius:2px;flex-shrink:0;
}

/* ── KPI Cards ─────────────────────────────── */
.kpi{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
  position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.kpi:hover{border-color:var(--border2);box-shadow:var(--shadow-lg)}
.kpi-accent{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent,var(--primary));
}
.kpi-glow{
  position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:var(--accent,var(--primary));
  opacity:.06;filter:blur(20px);
}
.kpi-label{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:6px;font-family:var(--font-mono)}
.kpi-sub{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.pill{font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px}
.pill-up  {background:rgba(16,185,129,.12);color:var(--green)}
.pill-dn  {background:rgba(239,68,68,.12);color:var(--red)}
.pill-warn{background:rgba(245,158,11,.12);color:var(--orange)}
.pill-info{background:rgba(59,130,246,.12);color:var(--primary)}
.pill-neu {background:rgba(100,116,139,.10);color:var(--text2)}

/* ── Charts ─────────────────────────────────── */
.ch{width:100%}
.ch300{height:300px}
.ch280{height:280px}
.ch260{height:260px}
.ch220{height:220px}

/* ── Tables ─────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  background:var(--bg3);color:var(--text3);font-size:11px;
  font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);
  white-space:nowrap;
}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.tr{text-align:right}
.tc{text-align:center}

/* ── Progress ───────────────────────────────── */
.prog-wrap{display:flex;align-items:center;gap:8px;min-width:120px}
.prog-bar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-lbl{font-size:11px;font-weight:600;font-family:var(--font-mono);width:36px;text-align:right}

/* ── Rank ───────────────────────────────────── */
.rnk{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.r1{background:linear-gradient(135deg,#e8b84b,#f5d17a);color:#6b4a00}
.r2{background:rgba(148,163,184,.18);color:#94a3b8}
.r3{background:rgba(180,120,80,.18);color:#cd7c50}
.rn{background:rgba(255,255,255,.06);color:var(--text3)}

/* ── Avatar ─────────────────────────────────── */
.av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:white;
}

/* ── Person Selector ────────────────────────── */
.p-sel{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.p-btn{
  padding:6px 14px;border:1px solid var(--border2);border-radius:100px;
  background:transparent;cursor:pointer;font-family:var(--font-sans);
  font-size:13px;color:var(--text2);transition:all .2s;
}
.p-btn:hover{color:var(--text);border-color:var(--primary)}
.p-btn.on{background:var(--primary-dim);border-color:var(--primary);color:var(--primary-lt);font-weight:600}

/* ── Expire Items ───────────────────────────── */
.exp-list{display:flex;flex-direction:column;gap:10px}
.exp-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 16px;border-radius:9px;
  border-left:3px solid;
}
.exp-today{border-color:var(--red);background:rgba(239,68,68,.07)}
.exp-soon{border-color:var(--orange);background:rgba(245,158,11,.06)}
.exp-name{font-size:14px;font-weight:600;margin-bottom:4px}
.exp-meta{font-size:12px;color:var(--text2)}
.exp-amt{font-size:15px;font-weight:700;font-family:var(--font-mono);margin-left:auto;flex-shrink:0}

/* ── Expire Warning (Tab 5) ─────────────────── */
.ew-list{display:flex;flex-direction:column}
.ew-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  transition:background .15s, opacity .35s;
}
.ew-row:last-child{border-bottom:none}
.ew-row:hover{background:rgba(255,255,255,.03)}
.ew-row.followed{opacity:.45}
.ew-row.followed .ew-client{text-decoration:line-through;color:var(--text3)}
.ew-badges{display:flex;gap:5px;flex-shrink:0}
.ew-client{font-size:14px;font-weight:600;flex:1;min-width:100px}
.ew-sales{font-size:12px;color:var(--text2);flex-shrink:0;width:50px}
.ew-amount{
  font-size:14px;font-weight:700;font-family:var(--font-mono);
  flex-shrink:0;width:82px;text-align:right;
}
.ew-deadline{
  font-size:12px;color:var(--text2);font-family:var(--font-mono);
  flex-shrink:0;width:60px;text-align:center;
}
.ew-countdown{
  font-size:12px;font-weight:700;font-family:var(--font-mono);
  flex-shrink:0;width:60px;text-align:center;
}
.ew-follow-btn{
  flex-shrink:0;padding:5px 11px;border-radius:6px;
  border:1px solid var(--primary);background:transparent;
  color:var(--primary);font-size:12px;font-weight:600;
  cursor:pointer;transition:background .2s,border-color .2s,color .2s;
}
.ew-follow-btn:hover:not(.done){background:var(--primary-dim)}
.ew-follow-btn.done{
  border-color:var(--text3);color:var(--text3);cursor:default;
}

/* ── Personal Detail (Tab 4) ────────────────── */
.pd-layout{display:grid;grid-template-columns:210px 1fr;gap:16px;align-items:start}
@media(max-width:860px){.pd-layout{grid-template-columns:1fr}}
.pd-sidebar{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:8px;display:flex;flex-direction:column;gap:4px;
  position:sticky;top:72px;
}
.pd-person-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:8px;cursor:pointer;border:1px solid transparent;
  transition:background .15s,border-color .15s;
}
.pd-person-item:hover{background:rgba(255,255,255,.04)}
.pd-person-item.active{
  background:var(--primary-dim);border-color:var(--primary);
}
.pd-person-name{font-size:13px;font-weight:500;color:var(--text2)}
.pd-person-item.active .pd-person-name{color:var(--primary-lt);font-weight:600}
.pd-person-val{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-top:2px}
.pd-main{display:flex;flex-direction:column;gap:16px}
.pd-mode-split{
  display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:center;
}
@media(max-width:700px){.pd-mode-split{grid-template-columns:1fr}}
.pd-table{width:100%;border-collapse:collapse}
.pd-table th{
  font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.5px;
  text-transform:uppercase;padding:6px 10px;text-align:left;
  border-bottom:1px solid var(--border);
}
.pd-table td{padding:10px 10px;font-size:13px;border-bottom:1px solid var(--border)}
.pd-table tr:last-child td{border-bottom:none}
.pd-table tr:hover td{background:rgba(255,255,255,.03)}
.cs-expired td{background:rgba(239,68,68,.07)!important}
.cs-soon td{background:rgba(245,158,11,.06)!important}
.ch200{height:200px}

/* ── Report Grid ────────────────────────────── */
.rpt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.rpt-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:14px;text-align:center;
}
.rpt-name{font-size:13px;font-weight:600;margin-bottom:10px}
.day-dots{display:flex;gap:4px;justify-content:center;margin-bottom:8px}
.day-dot{
  width:20px;height:20px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;
}
.dd-ok{background:rgba(16,185,129,.14);color:var(--green)}
.dd-no{background:rgba(255,255,255,.06);color:var(--text3)}

/* ── Workflow ───────────────────────────────── */
.wf-list{display:flex;flex-direction:column;gap:10px}
.wf-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);transition:border-color .2s;
}
.wf-item:hover{border-color:var(--border2)}
.wf-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.wf-info{flex:1;min-width:0}
.wf-name{font-size:13px;font-weight:600;margin-bottom:3px}
.wf-desc{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wf-meta{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--font-mono)}
.wf-item-err{border-color:rgba(239,68,68,.4)!important;background:rgba(239,68,68,.05)!important}
.wf-error{
  margin:8px 0 0;padding:7px 10px;border-radius:6px;
  background:rgba(255,23,68,.1);border-left:2px solid var(--red);
  font-size:11px;color:var(--red);font-family:var(--font-mono);line-height:1.5;
}
.wf-stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
}
.wf-stat-val{font-size:32px;font-weight:700;font-family:var(--font-mono);line-height:1;margin-bottom:6px}
.wf-stat-lbl{font-size:12px;color:var(--text2)}
.wr-table{width:100%;border-collapse:collapse}
.wr-table th{
  font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;
  letter-spacing:.5px;padding:7px 12px;text-align:center;
  border-bottom:1px solid var(--border);
}
.wr-table th:first-child{text-align:left}
.wr-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:center}
.wr-table td:first-child{text-align:left}
.wr-table tr:last-child td{border-bottom:none}
.wr-table tr:hover td{background:rgba(255,255,255,.03)}
.wr-dot{
  width:28px;height:28px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.wr-dot-ok{background:rgba(16,185,129,.14);color:var(--green)}
.wr-dot-no{background:rgba(239,68,68,.12);color:var(--red)}
.wr-prog-wrap{margin-bottom:14px}
.wr-prog-label{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:7px}
.wr-prog-bar{height:8px;background:var(--bg3);border-radius:4px}.wr-prog-fill{height:100%;border-radius:4px}

/* ── Badges ─────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:600}
.b-ok  {background:rgba(16,185,129,.12);color:var(--green)}
.b-warn{background:rgba(245,158,11,.12);color:var(--orange)}
.b-err {background:rgba(239,68,68,.12);color:var(--red)}
.b-info{background:rgba(59,130,246,.12);color:var(--primary)}
.b-gray{background:rgba(0,0,0,.06);color:var(--text2)}
.b-blue{background:var(--primary-dim);color:var(--primary)}
.b-dot {width:6px;height:6px;border-radius:50%;display:inline-block}

/* ── MoM ────────────────────────────────────── */
.up{color:var(--green);font-weight:600}
.dn{color:var(--red);font-weight:600}

/* ── Mode Cards ─────────────────────────────── */
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.mode-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:20px;position:relative;overflow:hidden;
}
.mode-card::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 80% 0%,var(--mc,transparent) 0%,transparent 60%);opacity:.07}
.mode-tag{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.mode-name{font-size:28px;font-weight:800;letter-spacing:1px;margin-bottom:12px}
.mode-val{font-size:22px;font-weight:700;font-family:var(--font-mono);margin-bottom:4px}
.mode-tgt{font-size:12px;color:var(--text2);margin-bottom:10px}

/* ── Section ────────────────────────────────── */
.s-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.s-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.s-title::before{content:'';width:3px;height:16px;background:var(--primary);border-radius:2px}

/* ── Global Toolbar ─────────────────────────── */
.g-toolbar{
  display:flex;align-items:center;flex-wrap:wrap;gap:10px;
  padding:14px 0 12px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.seg-group{
  display:flex;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:3px;gap:2px;
}
.seg-btn{
  padding:5px 18px;border:none;cursor:pointer;border-radius:6px;
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  color:var(--text2);background:transparent;transition:all .18s;
}
.seg-btn.on{
  background:var(--primary);color:#fff;font-weight:600;
  box-shadow:0 2px 8px rgba(30,136,229,.35);
}
.seg-btn:not(.on):hover{color:var(--text)}
.rf-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;
  font-family:var(--font-sans);font-size:13px;color:var(--text2);
  transition:all .18s;
}
.rf-btn:hover{border-color:var(--primary);color:var(--primary)}
.rf-icon{display:inline-block;font-size:14px;transition:transform .5s}
.rf-btn.spin .rf-icon{animation:rfSpin .55s linear}
@keyframes rfSpin{to{transform:rotate(360deg)}}
.g-toolbar-right{
  margin-left:auto;display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--text3);font-family:var(--font-mono);
}
.month-select{
  background:var(--bg3);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:5px 10px;font-size:13px;font-family:var(--font-sans);
  cursor:pointer;outline:none;transition:border-color .18s;
}
.month-select:hover,.month-select:focus{border-color:var(--primary)}
.day-picker-wrap{
  display:none;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:4px 10px;
}
.day-picker-wrap input[type=date]{
  background:transparent;color:var(--text);border:none;outline:none;
  font-size:13px;font-family:var(--font-sans);cursor:pointer;
  color-scheme:dark;
}
.view-badge{

.g5{
  display:grid;

  gap:14px;margin-bottom:18px;
}
@media(max-width:1280px){.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){.g5{grid-template-columns:repeat(2,1fr)}}

/* ── Divider ────────────────────────────────── */
.div{height:1px;background:var(--border);margin:16px 0}

/* ── Mono number ────────────────────────────── */
.mono{font-family:var(--font-mono)}

/* ── Ad Board ────────────────────────────────── */
.ab-split{
  display:grid;
  grid-template-columns:1fr 1.35fr;
  gap:24px;align-items:start;
}
@media(max-width:860px){.ab-split{grid-template-columns:1fr}}

/* 明细项 */
.ab-item{
  padding:12px 0;
  border-bottom:1px solid var(--border);
}
.ab-item:last-child{border-bottom:none}
.ab-item-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ab-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ab-icon{font-size:17px;flex-shrink:0;line-height:1}
.ab-name{font-size:13px;font-weight:600;flex:1;min-width:0}
.ab-tag{font-size:10px;color:var(--text3);letter-spacing:.3px}
.ab-share{
  font-size:11px;font-family:var(--font-mono);font-weight:600;
  padding:1px 6px;border-radius:4px;
  background:rgba(255,255,255,.07);color:var(--text2);
  flex-shrink:0;
}
.ab-nums{
  display:flex;align-items:center;justify-content:space-between;
  gap:6px;margin-bottom:6px;
}
.ab-actual{font-size:16px;font-weight:700;font-family:var(--font-mono)}
.ab-target{font-size:11px;color:var(--text3);font-family:var(--font-mono)}
.ab-bar-outer{height:6px;border-radius:100px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:6px}
.ab-bar-fill{height:100%;border-radius:100px;transition:width .75s cubic-bezier(.4,0,.2,1)}
.ab-foot{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.ab-pct{font-family:var(--font-mono);font-weight:700}
.ab-icon-st{font-size:13px}
.ab-mom{display:flex;align-items:center;gap:3px;font-family:var(--font-mono);font-weight:600}
.ab-clients{color:var(--text3)}

/* 额外图表高度 */
.ch360{height:360px}
.ch340{height:340px}
.nv-row{
  display:grid;
  grid-template-columns:18px 30px 1fr 48px 16px;
  align-items:center;gap:10px;
  padding:11px 0;
  border-bottom:1px solid var(--border);
}
.nv-row:last-child{border-bottom:none}
.nv-idx{font-size:11px;color:var(--text3);font-family:var(--font-mono);text-align:right}
.nv-mid{display:flex;flex-direction:column;gap:5px;min-width:0}
.nv-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.nv-name{font-size:13px;font-weight:600;white-space:nowrap}
.nv-nums{display:flex;align-items:baseline;gap:4px;white-space:nowrap}
.nv-actual{font-family:var(--font-mono);font-size:13px;font-weight:700}
.nv-sep{font-size:10px;color:var(--text3)}
.nv-target{font-family:var(--font-mono);font-size:11px;color:var(--text3)}
.nv-bar-outer{height:7px;border-radius:100px;background:rgba(255,255,255,.08);overflow:hidden}
.nv-bar-fill{height:100%;border-radius:100px;transition:width .75s cubic-bezier(.4,0,.2,1)}
.nv-pct{font-size:12px;font-weight:700;font-family:var(--font-mono);text-align:right;white-space:nowrap}
.nv-icon{font-size:14px;text-align:center}

/* ── NV Summary ─────────────────────────────── */
.nv-sum-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
  position:relative;overflow:hidden;
}
.nv-sum-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--ns-color,var(--primary));
}
.nv-sum-glow{
  position:absolute;top:-24px;right:-24px;
  width:90px;height:90px;border-radius:50%;
  background:var(--ns-color,var(--primary));
  opacity:.05;filter:blur(22px);
}
.nv-sum-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.nv-sum-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:8px}
.nv-sum-val{font-size:26px;font-weight:700;font-family:var(--font-mono);line-height:1}
.nv-sum-tgt{font-size:12px;color:var(--text2);margin-bottom:10px}
.nv-sum-bar{height:6px;border-radius:100px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:8px}
.nv-sum-fill{height:100%;border-radius:100px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.nv-sum-foot{display:flex;justify-content:space-between;font-size:12px;color:var(--text2)}
@media(max-width:860px){
  .g2,.g3,.mode-grid{grid-template-columns:1fr}
  .main{padding:14px 16px}
}

/* ── Overview Command Center ─────────────────── */
.ov-task-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 12px;border-radius:8px;
  border:1px solid var(--border);margin-bottom:8px;
  transition:box-shadow .15s;
}
.ov-task-item:last-child{margin-bottom:0}
.ov-task-item:hover{box-shadow:var(--shadow)}
.ov-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.ov-task-body{flex:1;min-width:0}
.ov-task-text{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.ov-task-meta{font-size:11px;color:var(--text2)}
.ov-health-row{
  display:flex;align-items:center;gap:12px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.ov-health-row:last-of-type{border-bottom:none}
.ov-highlight{
  background:var(--bg3);border-radius:8px;padding:10px 12px;text-align:center;
}
.ov-hl-val{font-size:20px;font-weight:700;font-family:var(--font-mono);line-height:1.2}
.ov-hl-lbl{font-size:11px;color:var(--text2);margin-top:3px}
.ov-soon-item{
  padding:10px 12px;background:var(--bg3);border-radius:8px;
  margin-bottom:8px;
}
.ov-soon-item:last-child{margin-bottom:0}
.ov-snap-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.ov-snap-item:last-child{border-bottom:none}

<body>

<!-- Header -->
<header class="hd" style="position:relative">
  <div class="hd-logo"><div class="hd-logo-gem">💎</div></div>
  <div class="hd-title">📊 逸品销售中心看板</div>
  <div class="hd-live"><div class="live-dot"></div>LIVE</div>
  <div class="hd-meta" id="hd-date"></div>
</header>

<!-- Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="go(0)">📊 总览</button>
  <button class="nav-btn" onclick="go(1)">🏆 销售排行</button>
  <button class="nav-btn" onclick="go(2)">📈 拓新/续费透视</button>
  <button class="nav-btn" onclick="go(3)">🔍 个人底裤深扒</button>
  <button class="nav-btn" onclick="go(4)">⚠️ 到期预警</button>
  <button class="nav-btn" onclick="go(5)">📋 周报月报</button>
</nav>

<!-- Panels -->
<div class="main">

  <!-- ░░ Global Toolbar ░░ -->
  <div class="g-toolbar">
    <div class="seg-group">
      <button class="seg-btn on" id="seg-month" onclick="setView('month')">📅 整月</button>
      <button class="seg-btn"    id="seg-day"   onclick="setView('day')">🗓 单日</button>
    </div>
    <select id="month-select" class="month-select" onchange="setMonth(this.value)">
      <option value="mar">2026年3月</option>
      <option value="feb">2026年2月</option>
      <option value="jan">2026年1月</option>
    </select>
    <div id="day-picker-wrap" class="day-picker-wrap">
      <span style="font-size:12px;color:var(--text3)">日期</span>
      <input type="date" id="day-picker" value="2026-03-27"
             min="2026-03-01" max="2026-03-27" onchange="setDate(this.value)">
    </div>
    <button class="rf-btn" id="rf-btn" onclick="forceRefresh()">
      <span class="rf-icon">↻</span>手动刷新
    </button>
    <div class="g-toolbar-right">
      <span id="view-badge" class="view-badge month">整月视角</span>
      <span id="last-refresh">刷新时间：—</span>
    </div>
  </div>

  <!-- ░░ 5 Global KPI Cards ░░ -->
  <div class="g4" id="g-kpi"></div>

  <!-- 0 总览 -->
  <div class="panel on" id="p0">
    <!-- 中间两列：团队健康度 + 广告大盘监控 -->
    <div class="g2 mb16">
      <div class="card" style="border-left:3px solid #1E88E5">
        <div class="card-hd"><div class="card-title">团队健康度</div></div>
        <div id="ov-health-list"></div>
      </div>
      <div class="card" style="border-left:3px solid #7C4DFF">
        <div class="card-hd"><div class="card-title">广告大盘监控</div></div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">合作模式</div>
        <div id="ov-ad-modes" style="margin-bottom:18px"></div>
        <div style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">垂直行业</div>
        <div id="ov-ad-industries"></div>
      </div>
    </div>
    <!-- 底部两列：本月快照 + 近3月走势 -->
    <div class="g2">
      <div class="card" style="border-left:3px solid #00BCD4">
        <div class="card-hd"><div class="card-title">本月数据快照</div></div>
        <div id="ov-snapshot"></div>
      </div>
      <div class="card" style="border-left:3px solid #FF9100">
        <div class="card-hd">
          <div class="card-title">近3月走势</div>
          <span class="badge b-gray" id="ov-trend-scope">整月视角</span>
        </div>
        <div class="ch ch280" id="ov-trend"></div>
      </div>
    </div>
  </div>

  <!-- 1 销售监控 -->
  <div class="panel" id="p1">
    <!-- 排行榜 -->
    <div class="card mb16" id="card-rank">

        <div style="display:flex;gap:10px;align-items:center">
          <span class="badge b-ok" style="font-size:10px">🏆 ≥100%</span>
          <span class="badge b-warn" style="font-size:10px">⚠️ 80–99%</span>
          <span class="badge b-err" style="font-size:10px">🚨 &lt;80%</span>
        </div>
      </div>
      <div class="tbl-wrap"><table id="t-rank"></table></div>
    </div>
    <!-- 近3月趋势 -->
    <div class="card mb16">
      <div class="card-hd"><div class="card-title">近 3 个月销售趋势</div>
        <span class="badge b-gray" id="trend-scope">整月视角</span></div>
      <div class="ch ch300" id="c-trend"></div>
    </div>
    <!-- 两个饼图并排 -->
    <div class="g2">
      <div class="card">

        <div class="ch ch280" id="c-rank-ind"></div>
      </div>
    </div>
  </div>

  <!-- 2 拓新/续费透视 -->
  <div class="panel" id="p2">

    <!-- 团队汇总条 -->
    <div class="g2 mb16" id="nv-summary"></div>

    <!-- 逐人进度双列 -->
    <div class="g2 mb16">
      <div class="card">
        <div class="card-hd">
          <div class="card-title">拓新透视</div>
          <span class="badge b-blue" id="nv-new-rate">—</span>
        </div>
        <div id="nv-new-list"></div>
      </div>
      <div class="card">
        <div class="card-hd">
          <div class="card-title">续费透视</div>
          <span class="badge b-blue" id="nv-renew-rate">—</span>
        </div>
        <div id="nv-renew-list"></div>
      </div>
    </div>

    <!-- 对比图 -->
    <div class="card">
      <div class="card-hd"><div class="card-title">拓新 vs 续费 实收 / 目标全景对比</div></div>
      <div class="ch ch300" id="c-nv-compare"></div>
    </div>

  </div>

  <!-- 3 个人底裤深扒 -->
  <div class="panel" id="p3">
    <div class="pd-layout">
      <div class="pd-sidebar" id="pd-sidebar"></div>
      <div class="pd-main" id="pd-main"></div>
    </div>
  </div>

  <!-- 4 到期预警 -->
  <div class="panel" id="p4">

    <!-- 今日到期 -->
    <div class="card mb16">
      <div class="card-hd">
        <div class="card-title">今日到期客户 <span id="ew-today-date" style="font-size:12px;font-weight:400;color:var(--text3);margin-left:4px"></span></div>
        <span class="badge b-err" id="ew-today-cnt">—</span>
      </div>
      <div class="ew-list" id="ew-today-list"></div>
    </div>

    <!-- 5天内到期（核心/重点） -->
    <div class="card">
      <div class="card-hd">
        <div class="card-title">5天内到期（核心 / 重点）</div>
        <span class="badge b-warn" id="ew-soon-cnt">—</span>
      </div>
      <div class="ew-list" id="ew-soon-list"></div>
    </div>

  </div>

  <!-- 5 周报月报 -->
  <div class="panel" id="p5">

    <!-- 整体完成率 -->
    <div class="card mb16">
      <div class="card-hd"><div class="card-title">整体完成率</div></div>
      <div id="wr-progress"></div>
    </div>

    <div class="g2">
      <!-- 周报 -->
      <div class="card">
        <div class="card-hd">
          <div class="card-title">本周周报提交状态</div>
          <span class="badge b-blue" id="wr-week-badge">—</span>
        </div>
        <div class="tbl-wrap">
          <table class="wr-table">
            <thead><tr>
              <th>姓名</th><th>状态</th><th>提交时间</th><th>周期</th>
            </tr></thead>
            <tbody id="wr-weekly-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 月报 -->
      <div class="card">
        <div class="card-hd">
          <div class="card-title">本月月报完成状态</div>
          <span class="badge b-blue" id="wr-month-badge">—</span>
        </div>
        <div class="tbl-wrap">
          <table class="wr-table">
            <thead><tr>

            </tr></thead>
            <tbody id="wr-monthly-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

</div>

const fmt = n => String(Math.round(n));
const fmtY = n => fmt(n);
const pct  = (a,b) => b ? Math.round(a/b*100) : 0;

function pctColor(r){
  return r>=100 ? "#00E676" : r>=80 ? "#FF9100" : "#FF1744";
}
function pctPill(r){
  const cls = r>=100?"pill-up":r>=80?"pill-warn":"pill-dn";
  return `<span class="pill ${cls}">${r}%</span>`;
}
function momHtml(v){
  if(!v) return '<span style="color:var(--text3)">—</span>';
  const cls = v>0?"up":"dn", arrow = v>0?"▲":"▼";
  return `<span class="${cls}">${arrow}${Math.abs(v)}%</span>`;
}
function statusBadge(s){
  if(s==="今日到期") return '<span class="badge b-err">今日到期</span>';
  if(s==="即将到期") return '<span class="badge b-warn">即将到期</span>';
  return '<span class="badge b-ok">正常</span>';
}
function typeBadge(t){
  if(t==="核心") return '<span class="badge b-err">核心</span>';
  if(t==="重点") return '<span class="badge b-warn">重点</span>';
  return '<span class="badge b-gray">普通</span>';
}
function avEl(name, color, sz=30){
  return `<div class="av" style="background:${color};width:${sz}px;height:${sz}px;font-size:${sz*0.4}px">${name[0]}</div>`;
}

// ║  VIEW MODE STATE                                             ║
// ╚══════════════════════════════════════════════════════════════╝
let viewMode     = 'month';      // 'month' | 'day'
let currentMonth = 'mar';        // 'mar' | 'feb' | 'jan'
let selectedDate = '2026-03-27'; // 单日视角选中日期

const MONTH_META = {
  mar: { year:2026, month:3, days:31, label:"2026年3月", defaultDate:"2026-03-27" },
  feb: { year:2026, month:2, days:29, label:"2026年2月", defaultDate:"2026-02-28" },
  jan: { year:2026, month:1, days:31, label:"2026年1月", defaultDate:"2026-01-31" },
};

function getMonthData(){
  return MOCK_DATA.monthlyData[currentMonth];
}
function getCurData(){
  const mData = getMonthData();
  if(viewMode === 'day'){
    return mData.dailyByDate[selectedDate] || mData;
  }
  return mData;
}

function _rerender(){
  renderGlobalKPIs();
  [0,1,2,3].forEach(i=>{ done[i]=false; });
  const curIdx = [...document.querySelectorAll(".panel")].findIndex(p=>p.classList.contains("on"));
  if(curIdx>=0){ renders[curIdx](); done[curIdx]=true; }
}

function setView(mode){
  if(viewMode === mode) return;
  viewMode = mode;
  document.getElementById("seg-month").classList.toggle("on", mode==="month");
  document.getElementById("seg-day").classList.toggle("on",   mode==="day");
  const badge = document.getElementById("view-badge");
  badge.textContent = mode==="day" ? "单日视角" : "整月视角";
  badge.className = "view-badge "+(mode==="day"?"day":"month");
  // 显示/隐藏日期选择器
  document.getElementById("day-picker-wrap").style.display = mode==="day" ? "flex" : "none";
  _rerender();
}

function setMonth(key){
  if(currentMonth === key) return;
  currentMonth = key;
  const meta = MONTH_META[key];
  selectedDate = meta.defaultDate;
  // 更新日期选择器范围
  const picker = document.getElementById("day-picker");
  const pad = n => String(n).padStart(2,'0');
  picker.min   = `${meta.year}-${pad(meta.month)}-01`;
  picker.max   = `${meta.year}-${pad(meta.month)}-${pad(meta.days)}`;
  picker.value = selectedDate;
  _rerender();
}

function setDate(date){
  selectedDate = date;
  _rerender();
}

function forceRefresh(){
  const btn = document.getElementById("rf-btn");
  btn.classList.add("spin");
  // 重置全部 tab
  done.fill(false);
  // 重绘全局 KPI 和当前 tab
  renderGlobalKPIs();
  const curIdx = [...document.querySelectorAll(".panel")]
    .findIndex(p=>p.classList.contains("on"));
  renders[curIdx](); done[curIdx]=true;
  // 更新刷新时间
  const now = new Date();
  document.getElementById("last-refresh").textContent =
    "刷新时间："+now.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  setTimeout(()=>btn.classList.remove("spin"), 600);
}

// ║  GLOBAL KPI CARDS（始终可见，随视角切换）                       ║
// ╚══════════════════════════════════════════════════════════════╝
function renderGlobalKPIs(){
  const D  = getCurData();
  const sl = D.salesList;
  const isDay = viewMode === 'day';

  // ① 本月 / 今日总实收
  const totA = D.totalActual !== undefined ? D.totalActual : sl.reduce((s,x)=>s+x.actual,0);
  const totT = D.totalTarget !== undefined ? D.totalTarget : sl.reduce((s,x)=>s+x.target,0);
  const totR = pct(totA,totT);

  // ② 全组KPI完成率（5人合计实收 / 5人合计目标，始终用整月数据）
  const msl = getMonthData().salesList;
  const teamActual = msl.reduce((s,x)=>s+x.actual,0);
  const teamTarget = msl.reduce((s,x)=>s+x.target,0);
  const teamKpi    = pct(teamActual, teamTarget);

  // ③ 今日到期
  const expCnt = getMonthData().expireToday.length;

  // ④ 周报完成率（本周已提交人数 / 总人数）
  const wrList = MOCK_DATA.weeklyReport.list || [];
  const wDoneKpi = wrList.filter(r=>r.weekly.submitted).length;
  const rptRate = pct(wDoneKpi, wrList.length || 5);

  document.getElementById("g-kpi").innerHTML = `
    <div class="kpi" style="--accent:#1E88E5">
      <div class="kpi-accent"></div><div class="kpi-glow"></div>
      <div class="kpi-label">${isDay?"今日实收":"本月总实收"}</div>
      <div class="kpi-val" style="color:#42A5F5">${fmtY(totA)}</div>
      <div class="kpi-sub">目标 ${fmtY(totT)} ${pctPill(totR)}</div>
    </div>
    <div class="kpi" style="--accent:#00BCD4">
      <div class="kpi-accent"></div><div class="kpi-glow"></div>
      <div class="kpi-label">全组KPI完成率</div>
      <div class="kpi-val" style="color:${pctColor(teamKpi)}">${teamKpi}<span style="font-size:16px;font-weight:400">%</span></div>
      <div class="kpi-sub">团队实收 ${fmtY(teamActual)} · ${pctPill(teamKpi)}</div>
    </div>
    <div class="kpi" style="--accent:${expCnt>0?'#FF1744':'#00E676'}">
      <div class="kpi-accent"></div><div class="kpi-glow"></div>
      <div class="kpi-label">今日到期</div>
      <div class="kpi-val" style="color:${expCnt>0?'#FF1744':'#00E676'}">${expCnt}<span style="font-size:16px;font-weight:400"> 单</span></div>
      <div class="kpi-sub">${expCnt>0?`共 ${expCntMoney()} 待续签`:"暂无到期合同"}</div>
    </div>
    <div class="kpi" style="--accent:${pctColor(rptRate)}">
      <div class="kpi-accent"></div><div class="kpi-glow"></div>
      <div class="kpi-label">周报完成率</div>
      <div class="kpi-val" style="color:${pctColor(rptRate)}">${rptRate}<span style="font-size:16px;font-weight:400">%</span></div>
      <div class="kpi-sub">${wDoneKpi}/${wrList.length||5} 人已提交 · ${pctPill(rptRate)}</div>
    </div>`;
}

function expCntMoney(){
  return fmtY(getMonthData().expireToday.reduce((s,x)=>s+x.amount,0));
}

      (D.renewData||getMonthData().renewData).find(x=>x.name===s.name)?.newActual    || 0,
      (D.renewData||getMonthData().renewData).find(x=>x.name===s.name)?.newTarget    || 1
    );
    const rr  = pct(
      (D.renewData||getMonthData().renewData).find(x=>x.name===s.name)?.renewActual  || 0,
      (D.renewData||getMonthData().renewData).find(x=>x.name===s.name)?.renewTarget  || 1
    );
    return `<tr>
      <td><span class="rnk ${rc}">${i+1}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          ${avEl(s.name,s.color)}
          <span style="font-weight:600">${s.name}</span>
        </div>
      </td>
      <td class="tr mono" style="color:#42A5F5;font-size:14px">${fmtY(s.actual)}</td>
      <td class="tr mono" style="color:var(--text2)">${fmtY(s.target)}</td>
      <td style="min-width:220px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="prog-bar" style="flex:1;height:7px;border-radius:100px;background:rgba(0,0,0,.06);overflow:hidden">
            <div style="height:100%;border-radius:100px;width:${Math.min(r,100)}%;background:${st.color};transition:width .7s cubic-bezier(.4,0,.2,1);
              box-shadow:0 0 8px ${st.color}55"></div>
          </div>
          <span style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:${st.color};width:38px;text-align:right">${r}%</span>
          <span style="font-size:14px" title="${r>=100?'已达标':r>=80?'接近目标':'未达标'}">${st.icon}</span>
        </div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="height:4px;width:52px;border-radius:100px;background:rgba(0,0,0,.06);overflow:hidden">
            <div style="height:100%;width:${Math.min(nr,100)}%;background:${pctColor(nr)}"></div>
          </div>
          <span style="font-size:11px;color:${pctColor(nr)};font-family:var(--font-mono)">${nr}%</span>
        </div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="height:4px;width:52px;border-radius:100px;background:rgba(0,0,0,.06);overflow:hidden">
            <div style="height:100%;width:${Math.min(rr,100)}%;background:${pctColor(rr)}"></div>
          </div>
          <span style="font-size:11px;color:${pctColor(rr)};font-family:var(--font-mono)">${rr}%</span>
        </div>
      </td>
      <td class="tc">${s.newOrders}</td>
      <td class="tc">${s.oldClients}</td>
    </tr>`;
  }).join("");

  document.getElementById("t-rank").innerHTML = `
    <thead><tr>
      <th style="width:44px">排名</th>
      <th>姓名</th>
      <th class="tr">实收</th>
      <th class="tr">目标</th>
      <th style="min-width:240px">总完成率</th>
      <th style="min-width:100px">拓新率</th>
      <th style="min-width:100px">续费率</th>
      <th class="tc">新单</th>
      <th class="tc">续客</th>
    </tr></thead>
    <tbody>${rows}</tbody>`;

  // ── 近 3 个月趋势折线图（单日视角时改为今日各人实收柱图）──
  document.getElementById("trend-scope").textContent = isDay ? "单日视角" : "整月视角";
  document.getElementById("trend-scope").className = "badge "+(isDay?"b-warn":"b-gray");

  if(!isDay){
    const td = MOCK_DATA.trendData;
    ec("c-trend").setOption(ext({
      tooltip:{
        ...BASE.tooltip, trigger:"axis",
        formatter: params => {
          let s = `<div style="font-weight:600;margin-bottom:6px">${params[0].axisValue}</div>`;
          params.forEach(p=>{ s += `${p.marker}${p.seriesName}：${p.value}<br/>`; });
          return s;
        }
      },
      legend:{ top:0, textStyle:{ color:"#64748b" } },
      grid:{ left:12, right:12, top:36, bottom:8, containLabel:true },
      xAxis:{ ...BASE.xAxis, type:"category", data:td.months,
        axisLabel:{ color:"#64748b" } },
      yAxis:{ ...BASE.yAxis, type:"value",
        axisLabel:{ formatter:v=>fmt(v), color:"#94a3b8" } },
      series: td.series.map(s=>({
        name: s.name, type:"line", smooth:true,
        data: s.data,
        symbol:"circle", symbolSize:7,
        lineStyle:{ color:s.color, width:2.5 },
        itemStyle:{ color:s.color, borderWidth:2, borderColor:"#fff" },
        areaStyle:{ color:{ type:"linear", x:0,y:0,x2:0,y2:1,
          colorStops:[{offset:0,color:s.color+"28"},{offset:1,color:s.color+"04"}] } },
      })),
    }));
  } else {
    // 单日：改为人员实收 vs 目标柱图
    ec("c-trend").setOption(ext({
      tooltip:{ ...BASE.tooltip, trigger:"axis", axisPointer:{type:"shadow"} },
      legend:{ data:["今日实收","今日目标"], top:0 },
      grid:{ left:12, right:12, top:36, bottom:8, containLabel:true },
      xAxis:{ ...BASE.xAxis, type:"category", data:salesList.map(s=>s.name) },
      yAxis:{ ...BASE.yAxis, type:"value", axisLabel:{ formatter:v=>fmt(v), color:"#94a3b8" } },
      series:[
        { name:"今日实收", type:"bar", barWidth:"36%", data:salesList.map(s=>s.actual),
          itemStyle:{ borderRadius:[4,4,0,0], color:p=>salesList[p.dataIndex].color } },
        { name:"今日目标", type:"bar", barWidth:"36%", data:salesList.map(s=>s.target),
          itemStyle:{ borderRadius:[4,4,0,0], color:"rgba(0,0,0,.07)" } },
      ],
    }));
  }

  // ── 合作模式分布横向条形图 ──
  const modes = getMonthData().adData.modes;
  ec("c-rank-mode").setOption(ext({
    tooltip:{ ...BASE.tooltip, trigger:"axis", axisPointer:{type:"shadow"},
      formatter: p=>`${p[0].name}：${p[0].value}` },
    grid:{ left:8, right:20, top:8, bottom:8, containLabel:true },
    xAxis:{ ...BASE.xAxis, type:"value", axisLabel:{ formatter:v=>fmt(v), color:"#94a3b8" } },
    yAxis:{ ...BASE.yAxis, type:"category", data:modes.map(m=>m.mode), inverse:true,
      axisLabel:{ color:"#64748b", fontFamily:"'DM Mono',monospace", fontSize:13 } },
    series:[{
      type:"bar", barMaxWidth:32,
      data: modes.map(m=>({ value:m.actual, itemStyle:{ color:m.color, borderRadius:[0,4,4,0] } })),
      label:{ show:true, position:"right", formatter:p=>fmt(p.value),
        color:"#e8eaf0", fontSize:12, fontFamily:"'DM Mono',monospace" },
    }],
  }));

  // ── 垂直行业分布横向条形图 ──
  const industries = getMonthData().adData.industries;
  const indColors  = ["#1E88E5","#7C4DFF","#00BCD4","#00E676","#FF9100","#FF5252","#26C6DA"];
  ec("c-rank-ind").setOption(ext({
    tooltip:{ ...BASE.tooltip, trigger:"axis", axisPointer:{type:"shadow"},
      formatter: p=>`${p[0].name}：${p[0].value}` },
    grid:{ left:8, right:20, top:8, bottom:8, containLabel:true },
    xAxis:{ ...BASE.xAxis, type:"value", axisLabel:{ formatter:v=>fmt(v), color:"#94a3b8" } },
    yAxis:{ ...BASE.yAxis, type:"category", data:industries.map(ind=>ind.name), inverse:true,
      axisLabel:{ color:"#64748b", fontSize:11 } },
    series:[{
      type:"bar", barMaxWidth:28,
      data: industries.map((ind,i)=>({ value:ind.actual,
        itemStyle:{ color:indColors[i%indColors.length], borderRadius:[0,4,4,0] } })),
      label:{ show:true, position:"right", formatter:p=>fmt(p.value),
        color:"#e8eaf0", fontSize:11, fontFamily:"'DM Mono',monospace" },
    }],
  }));
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  TAB 2 — 拓新 / 续费透视                                     ║
// ╚══════════════════════════════════════════════════════════════╝
function renderAdMode(){
  const D = getCurData();
  const rd = D.renewData || getMonthData().renewData;
  const sl = D.salesList || getMonthData().salesList;
  const colorOf = name => (sl.find(s=>s.name===name)||{}).color || "#1E88E5";

  // ── 帮助：状态图标 ──
  function si(r){ return r>=100?"🏆":r>=80?"⚠️":"🚨"; }

  // ── 团队汇总数字 ──
  const totNA = rd.reduce((s,x)=>s+x.newActual,0);
  const totNT = rd.reduce((s,x)=>s+x.newTarget,0);
  const totRA = rd.reduce((s,x)=>s+x.renewActual,0);
  const totRT = rd.reduce((s,x)=>s+x.renewTarget,0);
  const nr = pct(totNA,totNT), rr = pct(totRA,totRT);

  // 拓新完成人数 / 续费完成人数
  const nDone = rd.filter(x=>pct(x.newActual,x.newTarget)>=100).length;
  const rDone = rd.filter(x=>pct(x.renewActual,x.renewTarget)>=100).length;

  document.getElementById("nv-summary").innerHTML = `
    <div class="nv-sum-card" style="--ns-color:#1E88E5">
      <div class="nv-sum-glow"></div>
      <div class="nv-sum-label">团队拓新汇总</div>
      <div class="nv-sum-row">
        <div class="nv-sum-val" style="color:#42A5F5">${fmtY(totNA)}</div>
        ${pctPill(nr)}
      </div>
      <div class="nv-sum-tgt">目标 ${fmtY(totNT)} · 达标 ${nDone}/${rd.length} 人</div>
      <div class="nv-sum-bar"><div class="nv-sum-fill" style="width:${Math.min(nr,100)}%;background:${pctColor(nr)};
        box-shadow:0 0 8px ${pctColor(nr)}66"></div></div>
      <div class="nv-sum-foot">
        <span>未完成缺口 <strong style="color:#FF9100">${fmtY(Math.max(0,totNT-totNA))}</strong></span>
        <span>超额 <strong style="color:#00E676">${fmtY(Math.max(0,totNA-totNT))}</strong></span>
      </div>
    </div>
    <div class="nv-sum-card" style="--ns-color:#00E676">
      <div class="nv-sum-glow"></div>
      <div class="nv-sum-label">团队续费汇总</div>
      <div class="nv-sum-row">
        <div class="nv-sum-val" style="color:#00E676">${fmtY(totRA)}</div>
        ${pctPill(rr)}
      </div>
      <div class="nv-sum-tgt">目标 ${fmtY(totRT)} · 达标 ${rDone}/${rd.length} 人</div>
      <div class="nv-sum-bar"><div class="nv-sum-fill" style="width:${Math.min(rr,100)}%;background:${pctColor(rr)};
        box-shadow:0 0 8px ${pctColor(rr)}66"></div></div>
      <div class="nv-sum-foot">
        <span>未完成缺口 <strong style="color:#FF9100">${fmtY(Math.max(0,totRT-totRA))}</strong></span>
        <span>超额 <strong style="color:#00E676">${fmtY(Math.max(0,totRA-totRT))}</strong></span>
      </div>
    </div>`;

  // ── 逐人进度行生成器 ──
  function buildRows(sortedData, actualKey, targetKey){
    return sortedData.map((x,i)=>{
      const r   = pct(x[actualKey], x[targetKey]);
      const col = pctColor(r);
      const c   = colorOf(x.name);
      return `
      <div class="nv-row">
        <div class="nv-idx">${i+1}</div>
        ${avEl(x.name, c, 28)}
        <div class="nv-mid">
          <div class="nv-top">
            <span class="nv-name">${x.name}</span>
            <div class="nv-nums">
              <span class="nv-actual" style="color:${col}">${fmtY(x[actualKey])}</span>
              <span class="nv-sep">/</span>
              <span class="nv-target">${fmtY(x[targetKey])}</span>
            </div>
          </div>
          <div class="nv-bar-outer">
            <div class="nv-bar-fill" style="width:${Math.min(r,100)}%;background:${col};
              box-shadow:0 0 6px ${col}55"></div>
          </div>
        </div>
        <div class="nv-pct" style="color:${col}">${r}%</div>
        <div class="nv-icon">${si(r)}</div>
      </div>`;
    }).join("");
  }

  // 按实收降序排列
  const byNew   = [...rd].sort((a,b)=>b.newActual-a.newActual);
  const byRenew = [...rd].sort((a,b)=>b.renewActual-a.renewActual);

  document.getElementById("nv-new-list").innerHTML   = buildRows(byNew,   "newActual",   "newTarget");
  document.getElementById("nv-renew-list").innerHTML = buildRows(byRenew, "renewActual", "renewTarget");

  // 团队达成率徽章
  document.getElementById("nv-new-rate").textContent   = `团队 ${nr}%`;
  document.getElementById("nv-renew-rate").textContent = `团队 ${rr}%`;
  const nc = nr>=100?"b-ok":nr>=80?"b-warn":"b-err";
  const rc2 = rr>=100?"b-ok":rr>=80?"b-warn":"b-err";
  document.getElementById("nv-new-rate").className   = `badge ${nc}`;
  document.getElementById("nv-renew-rate").className = `badge ${rc2}`;

  // ── 全景对比图：4 组柱（拓新实/目标 + 续费实/目标）──
  const names = rd.map(x=>x.name);
  ec("c-nv-compare").setOption(ext({
    tooltip:{
      ...BASE.tooltip, trigger:"axis", axisPointer:{type:"shadow"},
      formatter: params => {
        let s = `<div style="font-weight:600;margin-bottom:5px">${params[0].axisValue}</div>`;
        params.forEach(p=>{
          s += `<div style="display:flex;justify-content:space-between;gap:20px">
            <span>${p.marker}${p.seriesName}</span>
            <span style="font-family:monospace;font-weight:600">${p.value}</span>
          </div>`;
        });
        return s;
      }
    },
    legend:{ data:["拓新实收","拓新目标","续费实收","续费目标"], top:0,
      textStyle:{ color:"#64748b" } },
    grid:{ left:12, right:12, top:38, bottom:8, containLabel:true },
    xAxis:{ ...BASE.xAxis, type:"category", data:names,
      axisLabel:{ color:"#64748b" } },
    yAxis:{ ...BASE.yAxis, type:"value",
      axisLabel:{ formatter:v=>fmt(v), color:"#94a3b8" } },
    series:[
      {
        name:"拓新实收", type:"bar", barWidth:"18%",
        data: rd.map(x=>x.newActual),
        itemStyle:{ borderRadius:[4,4,0,0], color: p=>{
          const r = pct(rd[p.dataIndex].newActual, rd[p.dataIndex].newTarget);
          return pctColor(r);
        }},
      },
      {
        name:"拓新目标", type:"bar", barWidth:"18%",
        data: rd.map(x=>x.newTarget),
        itemStyle:{ borderRadius:[4,4,0,0], color:"rgba(30,136,229,.18)" },
      },
      {
        name:"续费实收", type:"bar", barWidth:"18%",
        data: rd.map(x=>x.renewActual),
        itemStyle:{ borderRadius:[4,4,0,0], color: p=>{
          const r = pct(rd[p.dataIndex].renewActual, rd[p.dataIndex].renewTarget);
          return r>=100?"#00E676":r>=80?"#FF9100":"#FF1744";
        }},
      },
      {
        name:"续费目标", type:"bar", barWidth:"18%",
        data: rd.map(x=>x.renewTarget),
        itemStyle:{ borderRadius:[4,4,0,0], color:"rgba(0,230,118,.14)" },
      },
    ],
  }));
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  TAB 3 — 广告大盘监控                                        ║
// ╚══════════════════════════════════════════════════════════════╝
function renderPersonTab(){    // 保留名称，renders[] 数组中 index=3 指向此函数
  const { adData } = MOCK_DATA;
  const { modes, industries } = adData;
  const totMA = modes.reduce((s,m)=>s+m.actual,0);
  const totIA = industries.reduce((s,x)=>s+x.actual,0);
  const indColors = ["#1E88E5","#7C4DFF","#00BCD4","#00E676","#FF9100","#FF5252","#26C6DA"];

  // ── 公用：环比 HTML ──
  function momBadge(v){
    if(v===0||v==null) return `<span class="ab-mom" style="color:var(--text3)">— 持平</span>`;
    const col = v>0?"var(--green)":"var(--red)";
    const arrow = v>0?"▲":"▼";
    return `<span class="ab-mom" style="color:${col}">${arrow} ${Math.abs(v).toFixed(1)}%</span>`;
  }

  // ── 公用：状态图标 ──
  function si(r){ return r>=100?"🏆":r>=80?"⚠️":"🚨"; }

  // ────────────────────────────────────────────────
  // 合作模式区块
  // ────────────────────────────────────────────────
  document.getElementById("ab-mode-badges").innerHTML = `
    <span class="badge b-gray">总收入 ${fmtY(totMA)}</span>
    <span class="badge b-blue">3 种模式</span>`;

  // 模式饼图
  ec("c-ab-mode-pie").setOption(ext({
    tooltip:{ ...BASE.tooltip, trigger:"item",
      formatter: p=>`<b>${p.name}</b>（${p.data.label}）<br/>${p.value}<br/>占比 ${p.percent.toFixed(1)}%` },
    series:[{
      type:"pie", radius:["40%","70%"], center:["50%","52%"],
      data: modes.map(m=>({ name:m.mode, value:m.actual, label:m.label, itemStyle:{color:m.color} })),
      label:{
        show:true,
        formatter: p=>`{nm|${p.name}}\n{pt|${p.percent.toFixed(1)}%}`,
        rich:{
          nm:{ color:"#64748b", fontSize:11 },
          pt:{ color:"#e8eaf0", fontSize:15, fontWeight:"bold", fontFamily:"'DM Mono',monospace" },
        },
      },
      labelLine:{ length:10, length2:14, lineStyle:{color:"rgba(0,0,0,.15)"} },
      emphasis:{ itemStyle:{ shadowBlur:14, shadowColor:"rgba(0,0,0,.5)" } },
    }],
  }));

  // 模式明细列表
  document.getElementById("ab-mode-list").innerHTML = modes.map(m=>{
    const r   = pct(m.actual, m.target);
    const col = pctColor(r);
    const share = Math.round(m.actual/totMA*100);
    return `
    <div class="ab-item">
      <div class="ab-item-head">
        <span class="ab-icon">${m.icon}</span>
        <span class="ab-name">${m.mode}</span>
        <span class="ab-tag">${m.label}</span>
        <span class="ab-share">${share}%</span>
      </div>
      <div class="ab-nums">
        <span class="ab-actual" style="color:${m.color}">${fmtY(m.actual)}</span>
        <span class="ab-target">目标 ${fmtY(m.target)}</span>
      </div>
      <div class="ab-bar-outer">
        <div class="ab-bar-fill" style="width:${Math.min(r,100)}%;background:${col};box-shadow:0 0 7px ${col}55"></div>
      </div>
      <div class="ab-foot">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="ab-pct" style="color:${col}">${r}%</span>
          <span class="ab-icon-st">${si(r)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--text3);font-size:10px">环比</span>
          ${momBadge(m.mom)}
        </div>
      </div>
    </div>`;
  }).join("");

  // ────────────────────────────────────────────────
  // 垂直行业区块
  // ────────────────────────────────────────────────
  const totIT = industries.reduce((s,x)=>s+x.target,0);
  const totIR = pct(totIA, totIT);

  document.getElementById("ab-ind-badges").innerHTML = `
    <span class="badge b-gray">总收入 ${fmtY(totIA)}</span>
    <span class="badge ${totIR>=100?"b-ok":totIR>=80?"b-warn":"b-err"}">${totIR}%</span>
    <span class="badge b-blue">7 个行业</span>`;

  // 行业饼图
  ec("c-ab-ind-pie").setOption(ext({
    tooltip:{ ...BASE.tooltip, trigger:"item",
      formatter: p=>`<b>${p.name}</b><br/>${p.value}<br/>占比 ${p.percent.toFixed(1)}%` },
    legend:{ bottom:2, textStyle:{ color:"#64748b", fontSize:11 } },
    series:[{
      type:"pie", radius:["36%","62%"], center:["50%","47%"],
      data: industries.map((ind,i)=>({
        name:ind.name, value:ind.actual, itemStyle:{ color:indColors[i] },
      })),
      label:{
        show:true,
        formatter: p=>`{nm|${p.name}}\n{pt|${p.percent.toFixed(1)}%}`,
        rich:{
          nm:{ color:"#64748b", fontSize:10 },
          pt:{ color:"#e8eaf0", fontSize:13, fontWeight:"bold", fontFamily:"'DM Mono',monospace" },
        },
      },
      labelLine:{ length:8, length2:10, lineStyle:{color:"rgba(0,0,0,.12)"} },
      emphasis:{ itemStyle:{ shadowBlur:12, shadowColor:"rgba(0,0,0,.5)" } },
    }],
  }));

  // 行业明细列表（按实收降序）
  const indSorted = [...industries].map((x,i)=>({...x, color:indColors[i]}))
                                   .sort((a,b)=>b.actual-a.actual);
  document.getElementById("ab-ind-list").innerHTML = indSorted.map((ind,i)=>{
    const r   = pct(ind.actual, ind.target);
    const col = pctColor(r);
    const share = Math.round(ind.actual/totIA*100);
    return `
    <div class="ab-item">
      <div class="ab-item-head">
        <span class="ab-dot" style="background:${ind.color}"></span>
        <span class="ab-name">${ind.name}</span>
        <span class="ab-clients" style="font-size:11px">${ind.clients} 户</span>
        <span class="ab-share">${share}%</span>
      </div>
      <div class="ab-nums">
        <span class="ab-actual" style="color:${ind.color};font-size:14px">${fmtY(ind.actual)}</span>
        <span class="ab-target">目标 ${fmtY(ind.target)}</span>
      </div>
      <div class="ab-bar-outer">
        <div class="ab-bar-fill" style="width:${Math.min(r,100)}%;background:${col};box-shadow:0 0 6px ${col}44"></div>
      </div>
      <div class="ab-foot">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="ab-pct" style="color:${col}">${r}%</span>
          <span class="ab-icon-st">${si(r)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="color:var(--text3);font-size:10px">环比</span>
          ${momBadge(ind.mom)}
        </div>
      </div>
    </div>`;
  }).join("");
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  TAB 4 — 个人底裤深扒                                         ║
// ╚══════════════════════════════════════════════════════════════╝
let pdCurPerson = null;

function renderExpire(){
  const names  = Object.keys(getMonthData().personData);
  const colors = ["#1E88E5","#7C4DFF","#00BCD4","#00E676","#FF9100","#FF5252"];
  if(!pdCurPerson) pdCurPerson = names[0];

  // Sidebar
  document.getElementById("pd-sidebar").innerHTML = names.map((name, i) => {
    const pd = getMonthData().personData[name];
    const totAmt = pd.industryDetails.reduce((s,x)=>s+x.amount,0);
    return `<div class="pd-person-item ${pdCurPerson===name?'active':''}"
      onclick="pdSelect('${name}')">
      ${avEl(name, colors[i], 32)}
      <div>
        <div class="pd-person-name">${name}</div>
        <div class="pd-person-val">${fmtY(totAmt)}</div>
      </div>
    </div>`;
  }).join("");

  pdRenderDetail(pdCurPerson);
}

function pdSelect(name){
  pdCurPerson = name;
  document.querySelectorAll(".pd-person-item").forEach(el=>{
    el.classList.toggle("active",
      el.querySelector(".pd-person-name").textContent === name);
  });
  pdRenderDetail(name);
}

function pdRenderDetail(name){
  const pd = getMonthData().personData[name];
  const modeColors = { CPT:"#1E88E5", CPA:"#7C4DFF", CPS:"#00E676" };
  const totInd  = pd.industryDetails.reduce((s,x)=>s+x.amount,0);
  const totMode = pd.modeDetails.reduce((s,x)=>s+x.amount,0);

  // ── 垂直行业偏好 — 横向条形图 ──
  const indSorted = [...pd.industryDetails].sort((a,b)=>b.amount-a.amount);
  const indBars = indSorted.map(x=>{
    const sh = pct(x.amount, totInd);
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="width:56px;font-size:13px;font-weight:600;color:var(--text);flex-shrink:0">${x.industry}</span>
      <div style="flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden">
        <div style="width:${Math.min(sh,100)}%;height:100%;background:var(--primary);border-radius:100px;box-shadow:0 0 6px rgba(59,130,246,.5);transition:width .6s cubic-bezier(.4,0,.2,1)"></div>
      </div>
      <span style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text2);width:78px;text-align:right;flex-shrink:0">${fmtY(x.amount)}</span>
      <span style="font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--primary-lt);width:34px;text-align:right;flex-shrink:0">${sh}%</span>
    </div>`;
  }).join('');

  // ── 合作模式偏好 — 横向条形图 ──
  const modeSorted = [...pd.modeDetails].sort((a,b)=>b.amount-a.amount);
  const modeBars = modeSorted.map(x=>{
    const sh  = pct(x.amount, totMode);
    const col = modeColors[x.mode]||"#888";
    return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${col};box-shadow:0 0 6px ${col}99;flex-shrink:0"></span>
        <span style="font-size:14px;font-weight:700;color:${col};width:36px;flex-shrink:0">${x.mode}</span>
        <div style="flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden">
          <div style="width:${sh}%;height:100%;background:${col};border-radius:100px;box-shadow:0 0 8px ${col}77;transition:width .6s cubic-bezier(.4,0,.2,1)"></div>
        </div>
        <span style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text2);width:78px;text-align:right;flex-shrink:0">${fmtY(x.amount)}</span>
        <span style="font-family:var(--font-mono);font-size:12px;font-weight:700;color:${col};width:34px;text-align:right;flex-shrink:0">${sh}%</span>
      </div>
      <div style="font-size:11px;color:var(--text3);padding-left:18px">${x.orders} 笔</div>
    </div>`;
  }).join('');

  // ── 行业金额明细 — 纯文本列表 ──
  const indDetailList = indSorted.map(x=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:14px;font-weight:600;color:var(--text)">${x.industry}</span>
      <span style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--text2)">${x.amount.toLocaleString()}</span>
    </div>`
  ).join('');

  // ── Client rows ──
  const clientRows = pd.clients.map(c=>{
    const isTodayExp = c.status==="今日到期";
    const isSoon     = c.status==="即将到期";
    const rowCls     = isTodayExp?"cs-expired":isSoon?"cs-soon":"";
    return `<tr class="${rowCls}">
      <td style="font-weight:600">${c.name}</td>
      <td class="tc">${typeBadge(c.type)}</td>
      <td class="tr mono" style="font-weight:600">${fmtY(c.contract)}</td>
      <td class="tc mono" style="font-size:12px;color:var(--text2)">${c.expireDate}</td>
      <td class="tc">${statusBadge(c.status)}</td>
    </tr>`;
  }).join("");

  const cntExp  = pd.clients.filter(c=>c.status==="今日到期").length;
  const cntSoon = pd.clients.filter(c=>c.status==="即将到期").length;
  const cntOk   = pd.clients.filter(c=>c.status==="正常").length;

  document.getElementById("pd-main").innerHTML = `
    <!-- 垂直行业偏好画像 -->
    <div class="card">
      <div class="card-hd">
        <div class="card-title">垂直行业偏好画像</div>
        <span class="badge b-blue">${pd.industryDetails.length} 个行业</span>
      </div>
      ${indBars}
    </div>

    <!-- 合作模式吃粮偏好 -->
    <div class="card">
      <div class="card-hd"><div class="card-title">合作模式吃粮偏好</div></div>
      ${modeBars}
    </div>

    <!-- 客户明细 -->
    <div class="card">
      <div class="card-hd">
        <div class="card-title">客户明细</div>
        <div style="display:flex;gap:6px">
          ${cntExp  ? `<span class="badge b-err">${cntExp} 今日到期</span>` : ""}
          ${cntSoon ? `<span class="badge b-warn">${cntSoon} 即将到期</span>` : ""}
          ${cntOk   ? `<span class="badge b-ok">${cntOk} 正常</span>` : ""}
        </div>
      </div>
      <table class="pd-table">
        <thead><tr>
          <th>客户名称</th><th class="tc">类型</th><th class="tr">合同额</th>
          <th class="tc">到期日</th><th class="tc">状态</th>
        </tr></thead>
        <tbody>${clientRows}</tbody>
      </table>
    </div>

    <!-- 行业金额明细 -->
    <div class="card">
      <div class="card-hd">
        <div class="card-title">行业金额明细</div>
        <span class="badge b-gray">${pd.industryDetails.length} 项</span>
      </div>
      ${indDetailList}
    </div>
  `;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  TAB 5 — 到期预警                                            ║
// ╚══════════════════════════════════════════════════════════════╝
const expFollowed = new Set();

function expToggleFollow(key, btn){
  if(expFollowed.has(key)) return;
  expFollowed.add(key);
  btn.textContent = "✓ 已跟进";
  btn.classList.add("done");
  btn.disabled = true;
  btn.closest(".ew-row").classList.add("followed");
}

function renderReports(){
  const mData     = getMonthData();
  const todayList = mData.expireToday || [];
  const soonList  = mData.expireSoon  || [];

  const totTodayAmt = todayList.reduce((s,x)=>s+x.amount,0);

  // 来源月份 badge
  function srcBadge(src){
    const isF = src==="二月";
    return `<span class="badge" style="background:${isF?"rgba(30,136,229,.18)":"rgba(0,230,118,.13)"};color:${isF?"#64B5F6":"#69F0AE"}">${src||""}</span>`;
  }

  // 客户层级 badge
  const TIER_COLORS = {
    "战略客户":"#FF1744","核心客户":"#FF6D00","重点客户":"#FF9100",
    "成长客户":"#1E88E5","常规客户":"#00BCD4","培育客户":"#7C4DFF","观察客户":"#9E9E9E"
  };
  function tierBadge(tier){
    if(!tier) return "";
    const c = TIER_COLORS[tier]||"#9E9E9E";
    return `<span class="badge" style="background:${c}22;color:${c};font-weight:600">${tier}</span>`;
  }

  function followBtn(key){
    const done = expFollowed.has(key);
    return `<button class="ew-follow-btn${done?" done":""}" ${done?"disabled":""} onclick="expToggleFollow('${key}',this)">${done?"✓ 已跟进":"已跟进"}</button>`;
  }

  // 客户展示名（优先群名）
  function displayName(x){ return x.displayName || x.group || x.client || "未知客户"; }

  // ── 今日到期 ──
  document.getElementById("ew-today-list").innerHTML = todayList.length===0
    ? `<div style="padding:24px;text-align:center;color:var(--text3)">今日暂无到期客户</div>`
    : todayList.map(x=>{
        const key = (x.client||x.group||"")+"_"+x.expireDate;
        return `<div class="ew-row${expFollowed.has(key)?" followed":""}">
          <div class="ew-badges">${tierBadge(x.tier)}${srcBadge(x.source)}</div>
          <div class="ew-client ew-client-today" style="color:var(--red)">${displayName(x)}</div>
          <div class="ew-sales">${x.sales}</div>
          <div class="ew-amount" style="color:var(--red)">${fmtY(x.amount)}</div>
          ${followBtn(key)}
        </div>`;
      }).join("");

  // ── 5天内到期（单笔≥50万）──
  document.getElementById("ew-soon-list").innerHTML = soonList.length===0
    ? `<div style="padding:24px;text-align:center;color:var(--text3)">近5天暂无单笔≥50万到期</div>`
    : soonList.map(x=>{
        const key = (x.client||x.group||"")+"_"+x.expireDate;
        const col = x.daysLeft<=2?"var(--red)":"var(--orange)";
        const [,mo,dy] = x.expireDate.split("-");
        return `<div class="ew-row${expFollowed.has(key)?" followed":""}">
          <div class="ew-badges">${tierBadge(x.tier)}${srcBadge(x.source)}</div>
          <div class="ew-client">${displayName(x)}</div>
          <div class="ew-sales">${x.sales}</div>
          <div class="ew-amount" style="color:${col}">${fmtY(x.amount)}</div>
          <div class="ew-deadline">${+mo}月${+dy}日</div>
          <div class="ew-countdown" style="color:${col}">还剩 ${x.daysLeft} 天</div>
          ${followBtn(key)}
        </div>`;
      }).join("");

  const _now = new Date();
  document.getElementById("ew-today-date").textContent = `· ${_now.getMonth()+1}/${_now.getDate()}号到期预览`;
  document.getElementById("ew-today-cnt").textContent = `${todayList.length} 单 · ${fmtY(totTodayAmt)}`;
  document.getElementById("ew-soon-cnt").textContent  = `${soonList.length} 单（≥50万）`;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  TAB 6 — 周报月报                                            ║
// ╚══════════════════════════════════════════════════════════════╝
function renderWorkflow(){
  const wr = MOCK_DATA.weeklyReport;
  const list = wr.list || [];
  const wDone = list.filter(r=>r.weekly.submitted).length;
  const mDone = list.filter(r=>r.monthly.submitted).length;
  const wRate = pct(wDone, list.length), mRate = pct(mDone, list.length);
  const wCol  = pctColor(wRate),         mCol  = pctColor(mRate);
  const COLORS = ["#1E88E5","#FF9100","#00BCD4","#7C4DFF","#00E676"];

  document.getElementById("wr-progress").innerHTML = `
    <div class="wr-prog-wrap">
      <div class="wr-prog-label">
        <span style="color:var(--text2)">本周周报提交率
          <span style="font-size:11px;color:var(--text3)">（截止 ${wr.weeklyDeadline}）</span>
        </span>
        <span class="mono" style="font-weight:700;color:${wCol}">${wDone} / ${list.length} 人 · ${wRate}%</span>
      </div>
      <div class="wr-prog-bar"><div class="wr-prog-fill" style="width:${wRate}%;background:${wCol};box-shadow:0 0 8px ${wCol}55"></div></div>
    </div>
    <div class="wr-prog-wrap" style="margin-bottom:0">
      <div class="wr-prog-label">
        <span style="color:var(--text2)">本月月报提交率
          <span style="font-size:11px;color:var(--text3)">（截止 ${wr.monthlyDeadline}）</span>
        </span>
        <span class="mono" style="font-weight:700;color:${mCol}">${mDone} / ${list.length} 人 · ${mRate}%</span>
      </div>
      <div class="wr-prog-bar"><div class="wr-prog-fill" style="width:${mRate}%;background:${mCol};box-shadow:0 0 8px ${mCol}55"></div></div>
    </div>
  `;

  document.getElementById("wr-week-badge").textContent = wDone+"/"+list.length+" 已提交";
  document.getElementById("wr-weekly-tbody").innerHTML = list.map((r,i)=>{
    const w = r.weekly;
    const stCls = !w.submitted?"b-err":w.onTime?"b-ok":"b-warn";
    const stTxt = !w.submitted?"未提交":w.onTime?"按时提交":"逾期提交";
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">
        ${avEl(r.name,COLORS[i],28)}<span style="font-weight:500">${r.name}</span>
      </div></td>
      <td><span class="badge ${stCls}">${stTxt}</span></td>
      <td class="mono" style="font-size:13px;color:var(--text2)">${w.submitTime||"—"}</td>
      <td style="font-size:12px;color:var(--text3)">${w.period||"—"}</td>
    </tr>`;
  }).join("");

  document.getElementById("wr-month-badge").textContent = mDone+"/"+list.length+" 已提交";
  document.getElementById("wr-monthly-tbody").innerHTML = list.map((r,i)=>{
    const mo = r.monthly;
    const stCls = !mo.submitted?"b-err":mo.onTime?"b-ok":"b-warn";
    const stTxt = !mo.submitted?"未提交":mo.onTime?"按时提交":"逾期提交";
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">
        ${avEl(r.name,COLORS[i],28)}<span style="font-weight:500">${r.name}</span>
      </div></td>
      <td><span class="badge ${stCls}">${stTxt}</span></td>
      <td class="mono" style="font-size:13px;color:var(--text2)">${mo.submitTime||"—"}</td>
      <td style="font-size:12px;color:var(--text3)">${mo.period||"—"}</td>
    </tr>`;
  }).join("");
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  TAB SWITCH                                                  ║
// ╚══════════════════════════════════════════════════════════════╝
const renders = [renderOverview, renderRanking, renderAdMode, renderExpire, renderReports, renderWorkflow];
const done = Array(6).fill(false);

function go(idx){
  document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  document.querySelectorAll(".panel").forEach((p,i)=>p.classList.toggle("on",i===idx));
  if(!done[idx]){ renders[idx](); done[idx]=true; }
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  INIT                                                        ║
// ╚══════════════════════════════════════════════════════════════╝
document.getElementById("hd-date").textContent =
  new Date().toLocaleDateString("zh-CN",{ year:"numeric", month:"2-digit", day:"2-digit", weekday:"short" });

// 全局 KPI（始终显示）
renderGlobalKPIs();

// 初始刷新时间
document.getElementById("last-refresh").textContent =
  "刷新时间："+new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

renders[0](); done[0]=true;

window.addEventListener("resize",()=>{ Object.values(EC).forEach(c=>c&&c.resize()); });

// 每30分钟自动重载页面（与脚本更新频率同步）
setTimeout(()=>location.reload(), 30 * 60 * 1000);
</script>
</body>
